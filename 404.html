<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Page flew the coop — Gallus Genetics Resource Center</title>
<meta name="theme-color" content="#ffffff" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{--paper:#fff;--ink:#000;--blue:#007FFF;--muted:#5a5a5a}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:"Inter",system-ui,sans-serif;
    min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:32px}
  .box{max-width:560px}
  img{width:260px;max-width:70%;height:auto;margin-bottom:8px;filter:drop-shadow(-6px 10px 10px rgba(0,0,0,.12))}
  .code{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:clamp(3rem,9vw,5rem);line-height:1;letter-spacing:-.03em}
  .code .b{color:var(--blue)}
  h1{font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:clamp(1.4rem,3vw,2rem);margin:10px 0 12px;letter-spacing:-.02em}
  p{color:var(--muted);font-size:1.05rem;margin-bottom:28px}
  .btn{display:inline-flex;align-items:center;gap:8px;background:var(--blue);color:#fff;
    padding:12px 24px;border:2px solid var(--ink);font-weight:600;box-shadow:3px 3px 0 var(--ink);
    transition:transform .12s ease,box-shadow .12s ease;text-decoration:none}
  .btn:hover{transform:translate(-1px,-1px);box-shadow:5px 5px 0 var(--ink)}
</style>
</head>
<body>
  <div class="box">
    <img src="404-chicken.png" alt="A startled hen flapping its wings" />
    <div class="code">4<span class="b">0</span>4</div>
    <h1>This page flew the coop.</h1>
    <p>We couldn't find what you were looking for — but our hens are still here.</p>
    <a class="btn" href="/">Back to the roost</a>
  </div>
</body>
</html>
